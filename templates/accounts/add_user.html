<!DOCTYPE html>
<html>
<head>
    <title>Bulk Messaging Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            background: #f1f4f8;
            font-family: 'DM Sans', sans-serif;
            margin: 0;
        }

        /* ─── TOPBAR ─────────────────────────────── */
        .topbar {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 0 28px;
            height: 58px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 200;
            box-shadow: 0 1px 4px rgba(0,0,0,.07);
        }
        .topbar .me-4 {
            display: flex;
            align-items: center;
            padding-right: 24px;
            border-right: 1.5px solid #e2e8f0;
            margin-right: 20px !important;
        }
        .topbar .me-4 a {
            font-size: 17px;
            font-weight: 700;
            color: #0f172a !important;
            text-decoration: none !important;
            letter-spacing: -.5px;
            display: flex;
            align-items: center;
            gap: 9px;
        }
        .topbar .me-4 a::before {
            content: '';
            display: inline-block;
            width: 26px;
            height: 26px;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            border-radius: 7px;
            flex-shrink: 0;
        }
        .topbar .d-flex.gap-4.flex-grow-1 { gap: 2px !important; }
        .topbar .d-flex.gap-4.flex-grow-1 a {
            color: #64748b;
            text-decoration: none;
            font-size: 13.5px;
            font-weight: 500;
            padding: 7px 13px;
            border-radius: 7px;
            transition: background .15s, color .15s;
            white-space: nowrap;
        }
        .topbar .d-flex.gap-4.flex-grow-1 a:hover {
            background: #f1f5f9;
            color: #0f172a;
            text-decoration: none;
        }
        .topbar .d-flex.align-items-center.gap-3 { gap: 10px !important; }
        .topbar .d-flex.align-items-center.gap-3 span {
            font-size: 13px;
            color: #475569;
            font-weight: 500;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 5px 14px;
            border-radius: 99px;
        }
        .topbar .d-flex.align-items-center.gap-3 span b { color: #1e40af; }
        .topbar .d-flex.align-items-center.gap-3 a {
            color: #94a3b8;
            font-size: 18px;
            text-decoration: none;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            transition: all .15s;
        }
        .topbar .d-flex.align-items-center.gap-3 a:hover {
            border-color: #fca5a5;
            background: #fff5f5;
            color: #ef4444;
        }

        /* ─── CONTENT ────────────────────────────── */
        .container { max-width: 680px; }

        /* Breadcrumb-style back link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 500;
            color: #64748b;
            text-decoration: none;
            margin-bottom: 16px;
            transition: color .15s;
        }
        .back-link:hover { color: #2563eb; }

        /* Card */
        .card {
            border: 1px solid #f1f5f9 !important;
            border-radius: 16px !important;
            box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.05) !important;
        }

        .card h4 {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -.4px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f1f5f9;
            margin-bottom: 24px !important;
        }

        /* Labels */
        label {
            display: block;
            font-size: 12.5px;
            font-weight: 600;
            color: #475569;
            letter-spacing: .3px;
            margin-bottom: 7px;
        }

        /* Inputs */
        .form-control {
            background: #f8fafc !important;
            border: 1.5px solid #e2e8f0 !important;
            border-radius: 9px !important;
            font-family: 'DM Sans', sans-serif;
            font-size: 13.5px;
            color: #0f172a !important;
            padding: 10px 13px !important;
            transition: border-color .15s, box-shadow .15s, background .15s;
        }
        .form-control:focus {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 3px rgba(59,130,246,.12) !important;
            background: #fff !important;
            outline: none !important;
        }
        .form-control::placeholder { color: #cbd5e1 !important; }

        /* Select arrow fix */
        select.form-control {
            appearance: auto;
            cursor: pointer;
        }

        
        .btn-success {
            background: linear-gradient(135deg, #059669, #047857) !important;
            border: none !important;
            border-radius: 10px !important;
            font-family: 'DM Sans', sans-serif;
            font-size: 14.5px;
            font-weight: 600;
            padding: 12px !important;
            box-shadow: 0 4px 14px rgba(5,150,105,.28) !important;
            transition: all .18s !important;
            letter-spacing: .1px;
        }
        .btn-success:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(5,150,105,.38) !important;
        }
        .btn-success:active { transform: translateY(0); }
    </style>
</head>
<body>

<!-- BASE: topbar -->
<div class="topbar d-flex align-items-center">
    <div class="me-4">
        <a href="/dashboard/" class="text-white text-decoration-none">
            <strong>NotifyHub</strong>
        </a>
    </div>
    <div class="d-flex gap-4 flex-grow-1">
        <a href="/campaigns/create/">💻 Send WA</a>
        <a href="#">📁 Manager</a>
        <a href="/users/">👥 User Management</a>
        <a href="#">📊 Reports</a>
        <a href="#">👤 My Account</a>
    </div>
    <div class="d-flex align-items-center gap-3">
        <span>Welcome <b>{{ request.user.username }}</b></span>
        <a href="/logout/">⏻</a>
    </div>
</div>


<div class="container mt-4">

    <a href="/users/" class="back-link">← Back to User Management</a>

    <div class="card shadow p-4">

        <h4 class="mb-4">Create New Account</h4>

        <form method="POST">
            {% csrf_token %}

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label>Username *</label>
                    <input type="text" name="username" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Email *</label>
                    <input type="email" name="email" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Password *</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Role *</label>
                    <select name="role" class="form-control" required>
                        <option value="">Select Role</option>
                        <option value="admin">Admin</option>
                        <option value="manager">Manager</option>
                        <option value="support">Support</option>
                        <option value="user">User</option>
                    </select>
                </div>

            </div>

            <button type="submit" class="btn btn-success w-100 mt-3">
                Create Account
            </button>

        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
