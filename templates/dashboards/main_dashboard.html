<!DOCTYPE html>
<html>
<head>
    <title>Bulk Messaging Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            background: #f1f4f8;
            font-family: 'DM Sans', sans-serif;
            margin: 0;
        }

        /* ─── TOPBAR ─────────────────────────────── */
        .topbar {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 0 28px;
            height: 58px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 200;
            box-shadow: 0 1px 4px rgba(0,0,0,.07);
        }

        .topbar .me-4 {
            display: flex;
            align-items: center;
            padding-right: 24px;
            border-right: 1.5px solid #e2e8f0;
            margin-right: 20px !important;
        }
        .topbar .me-4 a {
            font-size: 17px;
            font-weight: 700;
            color: #0f172a !important;
            text-decoration: none !important;
            letter-spacing: -.5px;
            display: flex;
            align-items: center;
            gap: 9px;
        }
        .topbar .me-4 a::before {
            content: '';
            display: inline-block;
            width: 26px;
            height: 26px;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            border-radius: 7px;
            flex-shrink: 0;
        }

        .topbar .d-flex.gap-4.flex-grow-1 {
            gap: 2px !important;
        }
        .topbar .d-flex.gap-4.flex-grow-1 a {
            color: #64748b;
            text-decoration: none;
            font-size: 13.5px;
            font-weight: 500;
            padding: 7px 13px;
            border-radius: 7px;
            transition: background .15s, color .15s;
            white-space: nowrap;
        }
        .topbar .d-flex.gap-4.flex-grow-1 a:hover {
            background: #f1f5f9;
            color: #0f172a;
            text-decoration: none;
        }

        .topbar .d-flex.align-items-center.gap-3 { gap: 10px !important; }
        .topbar .d-flex.align-items-center.gap-3 span {
            font-size: 13px;
            color: #475569;
            font-weight: 500;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 5px 14px;
            border-radius: 99px;
        }
        .topbar .d-flex.align-items-center.gap-3 span b { color: #1e40af; }
        .topbar .d-flex.align-items-center.gap-3 a {
            color: #94a3b8;
            font-size: 18px;
            text-decoration: none;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            transition: all .15s;
        }
        .topbar .d-flex.align-items-center.gap-3 a:hover {
            border-color: #fca5a5;
            background: #fff5f5;
            color: #ef4444;
        }

        /* ─── DASHBOARD CONTENT ──────────────────── */

        h3.mb-4 {
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -.4px;
        }

        /* Stat cards */
        .stat-card {
            background: white;
            border-radius: 14px;
            padding: 24px 20px;
            box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.05);
            border: 1px solid #f1f5f9;
            transition: transform .2s, box-shadow .2s;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }
        .stat-card:nth-child(1) .stat-card::before,
        .col-md-3:nth-child(1) .stat-card::before { background: #3b82f6; }
        .col-md-3:nth-child(2) .stat-card::before { background: #10b981; }
        .col-md-3:nth-child(3) .stat-card::before { background: #ef4444; }
        .col-md-3:nth-child(4) .stat-card::before { background: #f59e0b; }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,.1);
        }

        .stat-title {
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: .7px;
            margin-bottom: 10px;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -1.5px;
            line-height: 1;
        }

        /* Icon bubble in corner */
        .stat-card .stat-icon {
            position: absolute;
            top: 18px;
            right: 18px;
            width: 36px;
            height: 36px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
        }
        .col-md-3:nth-child(1) .stat-icon { background: #eff6ff; }
        .col-md-3:nth-child(2) .stat-icon { background: #f0fdf4; }
        .col-md-3:nth-child(3) .stat-icon { background: #fff1f2; }
        .col-md-3:nth-child(4) .stat-icon { background: #fffbeb; }

        /* Banner */
        .main-banner {
            background: linear-gradient(135deg, #6fb1fc, #4364f7);
            border-radius: 18px;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: 600;
            margin-top: 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(67,100,247,.3);
        }

        /* Decorative circles on banner */
        .main-banner::before,
        .main-banner::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,.08);
        }
        .main-banner::before {
            width: 340px; height: 340px;
            top: -120px; right: -80px;
        }
        .main-banner::after {
            width: 200px; height: 200px;
            bottom: -80px; left: 60px;
        }

        .main-banner span {
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 12px rgba(0,0,0,.15);
        }
    </style>
</head>
<body>

<!-- BASE TEMPLATE: topbar -->
<div class="topbar d-flex align-items-center">

    <div class="me-4">
        <a href="/dashboard/" class="text-white text-decoration-none">
            <strong>NotifyHub</strong>
        </a>
    </div>

    <div class="d-flex gap-4 flex-grow-1">
        <a href="/campaigns/create/">💻 Send WA</a>
        <a href="#">📁 Manager</a>
        <a href="/users/">👥 User Management</a>
        <a href="#">📊 Reports</a>
        <a href="#">👤 My Account</a>
    </div>

    <div class="d-flex align-items-center gap-3">
        <span>Welcome <b>{{ request.user.username }}</b></span>
        <a href="/logout/">⏻</a>
    </div>

</div>

<!-- BLOCK CONTENT: dashboard -->
<div class="container mt-4">

    <h3 class="mb-4">Dashboard Overview</h3>

    <div class="row g-4">

        <div class="col-md-3">
            <div class="stat-card text-center">
                <div class="stat-icon">📨</div>
                <div class="stat-title">SMS Submission</div>
                <div class="stat-number text-primary">0</div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="stat-card text-center">
                <div class="stat-icon">✅</div>
                <div class="stat-title">Delivered</div>
                <div class="stat-number text-success">0</div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="stat-card text-center">
                <div class="stat-icon">❌</div>
                <div class="stat-title">Failed / Rejected</div>
                <div class="stat-number text-danger">0</div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="stat-card text-center">
                <div class="stat-icon">💳</div>
                <div class="stat-title">Credit Used</div>
                <div class="stat-number text-warning">0</div>
            </div>
        </div>

    </div>

    <div class="main-banner mt-4">
        <span>🚀 Welcome to Your Messaging Dashboard</span>
    </div>

</div>

</body>
</html>
