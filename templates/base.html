<!DOCTYPE html>
<html>
<head>
    <title>Bulk Messaging Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            background: #f1f4f8;
            font-family: 'DM Sans', sans-serif;
            margin: 0;
        }

        /* ═══════════════════════════════════════
           TOPBAR — same divs, same links, new skin
        ═══════════════════════════════════════ */
        .topbar {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 0 28px;
            height: 58px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 200;
            box-shadow: 0 1px 3px rgba(0,0,0,.06);
        }

        /* Brand — me-4 div > a */
        .topbar .me-4 a {
            font-size: 17px;
            font-weight: 700;
            color: #0f172a !important;
            text-decoration: none !important;
            letter-spacing: -.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .topbar .me-4 a::before {
            content: '';
            display: inline-block;
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            border-radius: 7px;
            flex-shrink: 0;
        }

        /* Separator between brand and nav */
        .topbar .me-4 {
            display: flex;
            align-items: center;
            padding-right: 24px;
            border-right: 1.5px solid #e2e8f0;
            margin-right: 20px !important;
        }

        /* Nav links — gap-4 flex div > a */
        .topbar .d-flex.gap-4.flex-grow-1 {
            gap: 2px !important;
        }
        .topbar .d-flex.gap-4.flex-grow-1 a {
            color: #64748b;
            text-decoration: none;
            font-size: 13.5px;
            font-weight: 500;
            padding: 7px 13px;
            border-radius: 7px;
            transition: background .15s, color .15s;
            white-space: nowrap;
        }
        .topbar .d-flex.gap-4.flex-grow-1 a:hover {
            background: #f1f5f9;
            color: #0f172a;
            text-decoration: none;
        }

        /* Right side */
        .topbar .d-flex.align-items-center.gap-3 {
            gap: 10px !important;
        }
        .topbar .d-flex.align-items-center.gap-3 span {
            font-size: 13px;
            color: #475569;
            font-weight: 500;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 5px 14px;
            border-radius: 99px;
        }
        .topbar .d-flex.align-items-center.gap-3 span b {
            color: #1e40af;
        }
        .topbar .d-flex.align-items-center.gap-3 a {
            color: #94a3b8;
            font-size: 18px;
            text-decoration: none;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            transition: all .15s;
        }
        .topbar .d-flex.align-items-center.gap-3 a:hover {
            border-color: #fca5a5;
            background: #fff5f5;
            color: #ef4444;
        }

        /* ═══════════════════════════════════════
           PAGE CONTENT
        ═══════════════════════════════════════ */
        .container {
            max-width: 1300px;
        }
    </style>
</head>
<body>

<div class="topbar d-flex align-items-center">

    <div class="me-4">
        <a href="/dashboard/" class="text-white text-decoration-none">
            <strong>NotifyHub</strong>
        </a>
    </div>

    <div class="d-flex gap-4 flex-grow-1">
        <a href="/campaigns/create/">💻 Send WA</a>
        <a href="#">📁 Manager</a>
        <a href="/users/">👥 User Management</a>
        <a href="#">📊 Reports</a>
        <a href="#">👤 My Account</a>
    </div>

    <div class="d-flex align-items-center gap-3">
        <span>Welcome <b>{{ request.user.username }}</b></span>
        <a href="/logout/">⏻</a>
    </div>

</div>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
