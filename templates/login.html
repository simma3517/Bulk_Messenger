<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f1f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Background blobs */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: .45;
            pointer-events: none;
        }
        body::before {
            width: 500px; height: 500px;
            background: #bfdbfe;
            top: -120px; left: -120px;
        }
        body::after {
            width: 400px; height: 400px;
            background: #c7d2fe;
            bottom: -100px; right: -80px;
        }

        /* Card */
        .login-card {
            background: #fff;
            border-radius: 20px;
            padding: 44px 40px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow:
                0 1px 3px rgba(0,0,0,.06),
                0 12px 40px rgba(0,0,0,.1);
            border: 1px solid #f1f5f9;
            position: relative;
            z-index: 1;
        }

        /* Logo */
        .login-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }
        .login-logo-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            border-radius: 10px;
            flex-shrink: 0;
        }
        .login-logo-text {
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -.5px;
        }

        /* Heading */
        h2 {
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -.4px;
            margin-bottom: 6px;
        }
        .login-sub {
            font-size: 13.5px;
            color: #94a3b8;
            margin-bottom: 28px;
        }

        /* Divider line */
        .login-divider {
            height: 1px;
            background: #f1f5f9;
            margin-bottom: 28px;
        }

        /* Field groups */
        .field {
            margin-bottom: 16px;
        }
        .field label {
            display: block;
            font-size: 12.5px;
            font-weight: 600;
            color: #475569;
            letter-spacing: .3px;
            margin-bottom: 7px;
        }
        .field input {
            width: 100%;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 11px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: #0f172a;
            transition: border-color .15s, box-shadow .15s, background .15s;
            outline: none;
        }
        .field input:focus {
            border-color: #3b82f6;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(59,130,246,.12);
        }
        .field input::placeholder { color: #cbd5e1; }

        /* Submit button */
        button[type="submit"] {
            width: 100%;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14.5px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            box-shadow: 0 4px 14px rgba(37,99,235,.3);
            transition: all .18s;
        }
        button[type="submit"]:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(37,99,235,.4);
        }
        button[type="submit"]:active {
            transform: translateY(0);
        }

        /* Error message */
        p[style] {
            margin-top: 16px !important;
            background: #fff1f2;
            border: 1px solid #fecdd3;
            color: #e11d48 !important;
            font-size: 13px;
            font-weight: 500;
            padding: 10px 14px;
            border-radius: 9px;
            display: block;
        }
        /* Hide empty error */
        p[style]:empty { display: none; }
    </style>
</head>
<body>

<div class="login-card">

    <div class="login-logo">
        <div class="login-logo-icon"></div>
        <span class="login-logo-text">NotifyHub</span>
    </div>

    <h2>Login</h2>
    <p class="login-sub">Sign in to your account to continue</p>
    <div class="login-divider"></div>

    <form method="POST" action="/login/">
        {% csrf_token %}

        <div class="field">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter your username">
        </div>

        <div class="field">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password">
        </div>

        <button type="submit">Login</button>
    </form>

    <p style="color:red;">{{ error }}</p>

</div>

</body>
</html>
